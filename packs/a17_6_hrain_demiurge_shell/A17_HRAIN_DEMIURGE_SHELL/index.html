<style>
:root{
 --bg-dark:#04070d;--bg-mid:#0c1420;--c-default:#00ffa3;--c-danger:#ff2a6d;--c-warn:#ffc857;--c-info:#6fd9ff;--c-jgpt:#ff58f1;--c-elite:#8db2ff;--c-user:#7dffb8;--c-system:#ffd166;--c-cluster:#7ba8ff;--c-bias:#90ff6b;--c-tail:#ffd45e;--border:rgba(255,255,255,.14);--glass:rgba(6,10,16,.74);--glass-strong:rgba(6,10,18,.92);--panel-shadow:0 24px 80px rgba(0,0,0,.65)
}

 radial-gradient(circle at 20% 20%,rgba(111,217,255,.08),transparent 28%),

 linear-gradient(180deg,#04070d 0%,#071019 40%,#04070d 100%);
 font-family:'Rajdhani',sans-serif;color:#eef6ff;user-select:none;touch-action:none;position:fixed}
body::before{content:"";position:absolute;inset:0;background:
 radial-gradient(circle at center,rgba(255,255,255,.05) 0,transparent 42%),
 repeating-radial-gradient(circle at center,rgba(255,255,255,.018) 0 1px,transparent 1px 8px);
 mix-blend-mode:screen;opacity:.35;pointer-events:none;animation:slow-spin 60s linear infinite}
@keyframes slow-spin{from{transform:scale(1.02) rotate(0deg)}to{transform:scale(1.02) rotate(360deg)}}
#neural-bg{position:absolute;inset:0;background:
 radial-gradient(circle at 50% 45%,rgba(21,38,58,.55),transparent 38%),
 radial-gradient(circle at 50% 50%,rgba(0,255,163,.06),transparent 55%);
 z-index:0;animation:breathe 16s ease-in-out infinite alternate;pointer-events:none}
@keyframes breathe{0%{opacity:.52;transform:scale(1)}100%{opacity:1;transform:scale(1.08)}}
#particles{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}.particle{position:absolute;border-radius:50%;background:rgba(255,255,255,.9);opacity:.2;filter:blur(.6px);animation:drift 34s linear infinite;box-shadow:0 0 12px currentColor}
@keyframes drift{0%{transform:translate3d(0,0,0) scale(.7);opacity:0}15%{opacity:.22}85%{opacity:.16}100%{transform:translate3d(0,-110vh,0) scale(1.25);opacity:0}}
body.performance-paused .particle,body.presentation .particle{animation-play-state:paused}
.ui-layer{position:fixed;inset:0;z-index:20;pointer-events:none}.ui-interactive{pointer-events:auto!important}
#chart{position:absolute;inset:0;z-index:1;overflow:hidden}#scene-canvas,#chart svg{position:absolute;inset:0;width:100%;height:100%}#scene-canvas{pointer-events:none;mix-blend-mode:screen;opacity:.96}#chart svg{overflow:visible}
#logo{position:absolute;top:28px;left:30px;font-family:'Orbitron',sans-serif;font-size:1.34rem;letter-spacing:2px;color:rgba(255,255,255,.42);text-shadow:0 0 15px rgba(111,217,255,.18);cursor:pointer}#logo span{color:var(--c-default);text-shadow:0 0 24px rgba(0,255,163,.36)}#status-light{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2d3643;margin-left:10px;box-shadow:0 0 10px rgba(0,0,0,.9);transition:.3s}#status-light.online{background:var(--c-default);box-shadow:0 0 14px var(--c-default),0 0 28px rgba(0,255,163,.45)}
.top-controls{position:absolute;top:24px;right:24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;max-width:min(76vw,840px)}
.btn,input,select{background:linear-gradient(180deg,rgba(18,25,35,.86),rgba(8,12,18,.92));border:1px solid var(--border);color:rgba(255,255,255,.88);backdrop-filter:blur(12px);padding:9px 14px;border-radius:8px;font-family:'Orbitron',sans-serif;font-weight:600;font-size:.72rem;cursor:pointer;transition:.22s ease;text-transform:uppercase;letter-spacing:1px;box-shadow:0 10px 24px rgba(0,0,0,.45)}
input{font-family:'Rajdhani';text-transform:none;width:190px;cursor:text}select{cursor:pointer}
.btn:hover{border-color:var(--c-default);color:#fff;box-shadow:0 0 18px rgba(0,255,163,.22),0 10px 24px rgba(0,0,0,.42)}.btn:active{transform:scale(.96)}.btn.active{border-color:var(--c-default);color:var(--c-default);background:rgba(0,255,163,.14)}.btn.loading{border-color:var(--c-jgpt);color:var(--c-jgpt);animation:pulse-btn .9s infinite alternate}
@keyframes pulse-btn{0%{opacity:.7}100%{opacity:1;box-shadow:0 0 18px rgba(255,88,241,.35)}}
#view-indicator{position:absolute;top:72px;right:30px;padding:10px 14px;min-width:240px;border-radius:12px;background:rgba(7,11,18,.74);border:1px solid rgba(255,255,255,.08);box-shadow:var(--panel-shadow);backdrop-filter:blur(10px);font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:1px;color:rgba(255,255,255,.84);text-align:right;line-height:1.5}
#view-indicator .mode{color:var(--c-default);display:block;font-size:.8rem;margin-bottom:2px}#view-indicator .focus{color:rgba(255,255,255,.68);font-family:'Rajdhani';letter-spacing:.8px;font-size:.92rem}
#stats{position:absolute;bottom:18px;left:28px;display:flex;gap:7px;flex-wrap:wrap;max-width:78%}.pill{background:rgba(6,10,18,.72);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:6px 10px;font-size:.78rem;box-shadow:0 10px 24px rgba(0,0,0,.34)}
#panel{position:absolute;bottom:40px;left:40px;max-width:430px;opacity:0;transform:translateY(20px);transition:.3s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:25}#panel.visible{opacity:1;transform:translateY(0)}
#panel-title{font-family:'Orbitron';font-size:1.25rem;color:var(--c-default);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 10px rgba(0,255,163,.4)}

.node-group{cursor:pointer;transition:opacity .18s ease}.node-group .node-halo{opacity:.22;filter:blur(8px);transition:opacity .2s ease,filter .2s ease}.node-group .node-shell{fill:rgba(255,255,255,.045);stroke:rgba(255,255,255,.12);stroke-width:1}.node-group .node-core{stroke:rgba(255,255,255,.28);stroke-width:1.2px}.node-group .node-ring{fill:none;stroke:rgba(255,255,255,.16);stroke-width:1.2px;stroke-dasharray:8 6;opacity:.36}.node-group.cluster .node-ring{stroke-width:1.8px;opacity:.58}.node-group.selected .node-core{stroke:#fff;filter:drop-shadow(0 0 12px currentColor)}.node-emoji{font-family:'Segoe UI Emoji','Apple Color Emoji',sans-serif;text-anchor:middle;dominant-baseline:central;pointer-events:none}.node-label{font-family:'Rajdhani';font-size:12px;font-weight:700;fill:rgba(255,255,255,.90);text-anchor:middle;pointer-events:none;text-shadow:0 2px 7px #000}.node-meta,.node-badge{font-family:'Orbitron';font-size:9px;fill:rgba(255,255,255,.55);text-anchor:middle;pointer-events:none}.node-badge{font-size:10px;fill:var(--c-default)}
.impulse{filter:drop-shadow(0 0 8px currentColor);pointer-events:none;mix-blend-mode:screen;opacity:.68}
body.lod-clusters .node-group.detail-node{opacity:.12}body.labels-off .node-label,body.labels-off .node-meta,body.labels-off .node-badge{display:none}body.presentation .top-controls,body.presentation #view-indicator{opacity:0;pointer-events:none}body.presentation #stats{opacity:.35}
@media(max-width:900px){.top-controls{left:20px;right:20px;top:70px;max-width:none}#logo{top:22px}#view-indicator{display:none}#panel{left:20px;right:20px;bottom:26px;max-width:none}input{width:140px}}

<div id="chart"><canvas id="scene-canvas"></canvas></div>
<div class="ui-layer">
 <div id="logo" class="ui-interactive">HR<span>ai</span>N <span style="font-size:.75rem;color:rgba(255,255,255,.34)">A17.5</span><span id="status-light"></span></div>

 </div>

</div>

<script>
"use strict";
const CONFIG={isMobile:innerWidth<768,zoomClusterThreshold:.28,zoomMediumThreshold:.86,maxClusterLinks:28,maxConstellationLinks:120,maxDetailLinks:220,maxNodesMediumPerCluster:8,maxDetailNodes:innerWidth<768?130:230,maxDpr:innerWidth<768?1.35:1.65,particleCount:innerWidth<768?14:24,refreshMs:2500,videoSafeRefreshMs:6500,animationPulseChance:innerWidth<768?.018:.035,videoSafePulseChance:.004};
const COLORS={default:'#00ffa3',danger:'#ff2a6d',warn:'#ffc857',info:'#6fd9ff',jgpt:'#ff58f1',elite:'#8db2ff',user:'#7dffb8',system:'#ffd166',cluster:'#7ba8ff',bias:'#90ff6b',tail:'#ffd45e',pool:'#ff9b2f'};
const TYPE_BY_GROUP={janus:'default',mirror:'danger',pool:'pool',bias:'bias',tail:'tail',mind:'jgpt',concept:'info',concept_order:'info',concept_chaos:'danger',proof:'default',safety:'warn',core:'default',event:'elite'};
function safeType(t){return COLORS[t]?t:'default'}function colorFor(t,a=1){const c=COLORS[safeType(t)]||COLORS.default;if(a===1)return c;const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(c);return m?`rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${a})`:c}
function hash(input){let h=2166136261;const s=String(input||'');for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}return Math.abs(h>>>0)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function score(d){return +d.score||1}
function makeParticles(){const root=document.getElementById('particles');for(let i=0;i<CONFIG.particleCount;i++){const p=document.createElement('div');p.className='particle';const c=[COLORS.default,COLORS.info,COLORS.jgpt,COLORS.tail][i%4];p.style.color=c;p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';const s=1+Math.random()*3.5;p.style.width=s+'px';p.style.height=s+'px';p.style.animationDuration=(20+Math.random()*24)+'s';p.style.animationDelay=(-Math.random()*20)+'s';root.appendChild(p)}}makeParticles();

const App={globalNodes:[],globalLinks:[],renderState:{nodes:[],links:[],clusters:[]},nodeIndex:new Map(),renderNodeMap:new Map(),selectedNode:null,hoveredDatum:null,width:innerWidth,height:innerHeight,dpr:devicePixelRatio||1,svg:null,g:null,nodeG:null,impulseG:null,canvas:null,ctx:null,sim:null,currentTransform:d3.zoomIdentity,currentZoom:.34,viewMode:'constellation',live:true,filter:'all',query:'',detail:'normal',labels:'auto',videoSafe:false,pollTimer:null,knownMtime:0,lastFrame:0,isVisible:!document.hidden,
 init(){App.canvas=document.getElementById('scene-canvas');App.ctx=App.canvas.getContext('2d',{alpha:true});App.resizeCanvas();App.svg=d3.select('#chart').append('svg').attr('width','100%').attr('height','100%');App.g=App.svg.append('g');App.impulseG=App.g.append('g').attr('class','impulses');App.nodeG=App.g.append('g').attr('class','nodes');const zoom=d3.zoom().scaleExtent([.08,3.6]).on('zoom',e=>{App.currentTransform=e.transform;App.currentZoom=e.transform.k;App.g.attr('transform',e.transform);App.updateModeIndicator();App.updateLabelLOD();App.drawFrame()});App.zoom=zoom;App.svg.call(zoom).call(zoom.transform,d3.zoomIdentity.translate(App.width/2,App.height/2).scale(.34).translate(-App.width/2,-App.height/2)).on('dblclick.zoom',null);App.svg.on('click',e=>{if(e.target.tagName==='svg')App.deselect()});App.sim=d3.forceSimulation([]).force('link',d3.forceLink([]).id(d=>d.id).distance(d=>d.linkDistance||170).strength(d=>d.linkStrength||.16)).force('charge',d3.forceManyBody().strength(d=>d.kind==='cluster'?-2300:d.kind==='core'?-2600:-980)).force('collide',d3.forceCollide().radius(d=>(d.radius||18)+18).strength(.96).iterations(2)).force('x',d3.forceX(d=>d.tx||App.width/2).strength(d=>d.forceStrengthX||.16)).force('y',d3.forceY(d=>d.ty||App.height/2).strength(d=>d.forceStrengthY||.16)).velocityDecay(.38).on('tick',()=>{if(App.isVisible)App.drawFrame()});window.addEventListener('resize',()=>{clearTimeout(App.resizeTimer);App.resizeTimer=setTimeout(()=>{App.width=innerWidth;App.height=innerHeight;App.resizeCanvas();App.updateView(App.videoSafe?.18:.35)},120)});document.addEventListener('visibilitychange',()=>{App.isVisible=!document.hidden;if(App.isVisible&&App.live)App.sim.alpha(App.videoSafe?.08:.25).restart();});App.bindUI();App.pollStatus();App.loadGraph();App.resetPollTimer();requestAnimationFrame(App.animateVisuals);},
 resizeCanvas(){App.dpr=Math.min(devicePixelRatio||1,CONFIG.maxDpr);App.canvas.width=Math.round(App.width*App.dpr);App.canvas.height=Math.round(App.height*App.dpr);App.canvas.style.width=App.width+'px';App.canvas.style.height=App.height+'px';},
 bindUI(){const $=id=>document.getElementById(id);$('btn-reload').onclick=()=>App.loadGraph(true);$('btn-live').onclick=()=>{App.live=true;App.sim.alpha(App.videoSafe?.20:.55).restart();$('btn-live').classList.add('active');$('btn-freeze').classList.remove('active');document.body.classList.remove('performance-paused')};$('btn-freeze').onclick=()=>{App.live=false;App.sim.stop();$('btn-freeze').classList.add('active');$('btn-live').classList.remove('active');document.body.classList.add('performance-paused');App.drawFrame()};$('btn-present').onclick=()=>{document.body.classList.toggle('presentation');$('btn-present').classList.toggle('active',document.body.classList.contains('presentation'))};$('btn-fit').onclick=()=>App.fit();$('btn-bias').onclick=()=>open('temple_route_bias.json?ts='+Date.now(),'_blank');$('btn-matrix').onclick=()=>open('route_transition_matrix.json?ts='+Date.now(),'_blank');$('btn-hyp').onclick=()=>open('janus_demiurge_hypotheses.json?ts='+Date.now(),'_blank');$('search').oninput=e=>{App.query=e.target.value.trim().toLowerCase();App.updateView(App.videoSafe?.22:.55)};$('filter').onchange=e=>{App.filter=e.target.value;App.updateView(App.videoSafe?.22:.65)};$('detail').onchange=e=>{App.detail=e.target.value;App.applyVideoSafe(e.target.value==='video_safe');App.updateView(App.videoSafe?.18:.85)};$('labels').onchange=e=>{App.labels=e.target.value;App.updateLabelLOD()};document.getElementById('logo').onclick=()=>document.getElementById('panel').classList.toggle('visible')},
 normalizeNode(n){const group=n.group||n.kind||'default';const type=safeType(n.type||TYPE_BY_GROUP[group]||TYPE_BY_GROUP[n.kind]||'default');const id=String(n.id);const label=n.label||id;const s=score(n);const kind=n.kind||'node';const z=+n.z||0;const clusterKey=App.clusterKeyFor({...n,group,kind});const radius=clamp(12+Math.sqrt(s)*.8+(z>=28?6:0)+(kind==='core'?20:0)+(kind==='bias'?8:0),12,48);return {...n,id,label,group,kind,type,score:s,z,clusterKey,radius}},
 clusterKeyFor(n){if(n.kind==='core'||n.group==='core')return 'CORE';if(n.kind==='bias'||n.group==='bias')return 'BIAS';if(n.kind==='hypothesis'||n.group==='mind')return 'MIND';if(n.group==='janus')return 'JANUS';if(n.group==='mirror')return 'MIRROR';if(n.group==='pool')return 'POOL';if(n.group==='tail'||n.kind==='tail')return 'TAIL';if(n.kind==='concept'||String(n.group).startsWith('concept'))return 'CONCEPT';if(n.kind==='accepted')return 'PROOF';if(n.kind==='route')return 'ROUTES';return 'EVENTS'},
 clusterCenter(key){const w=App.width,h=App.height;const map={CORE:[w*.50,h*.50],JANUS:[w*.34,h*.52],MIRROR:[w*.70,h*.52],POOL:[w*.50,h*.22],BIAS:[w*.24,h*.25],TAIL:[w*.78,h*.25],MIND:[w*.52,h*.18],CONCEPT:[w*.50,h*.76],PROOF:[w*.50,h*.58],ROUTES:[w*.44,h*.48],EVENTS:[w*.58,h*.48]};return map[key]||[w*.50,h*.50]},
 makeCluster(key,nodes){const [x,y]=App.clusterCenter(key);const total=nodes.reduce((a,n)=>a+score(n),0);const type=key==='MIRROR'?'danger':key==='POOL'?'pool':key==='BIAS'?'bias':key==='TAIL'?'tail':key==='MIND'?'jgpt':key==='CONCEPT'?'info':'default';return {id:'cluster:'+key,label:key,kind:'cluster',group:key.toLowerCase(),type,clusterKey:key,count:nodes.length,score:total,radius:clamp(26+Math.sqrt(nodes.length)*8,38,94),x,y,tx:x,ty:y,forceStrengthX:.22,forceStrengthY:.22}},
 pass(n){if(App.filter!=='all'){if(App.filter==='route'&&n.kind!=='route')return false;if(App.filter==='accepted'&&n.kind!=='accepted')return false;if(App.filter==='bias'&&n.kind!=='bias')return false;if(App.filter==='hypothesis'&&n.kind!=='hypothesis')return false;if(App.filter==='tail'&&n.kind!=='tail'&&n.group!=='tail')return false;if(!['route','accepted','bias','hypothesis','tail'].includes(App.filter)&&n.group!==App.filter&&n.kind!==App.filter)return false}if(App.query){const h=(n.id+' '+n.label+' '+n.kind+' '+n.group+' '+JSON.stringify(n.data||{})).toLowerCase();if(!h.includes(App.query))return false}return true},
 modeForZoom(){if(App.videoSafe||App.detail==='video_safe')return App.currentZoom<1.05?'clusters':'constellation';if(App.detail==='cinema')return App.currentZoom<.82?'clusters':'constellation';if(App.detail==='deep')return App.currentZoom<.25?'clusters':(App.currentZoom<.65?'constellation':'detail');if(App.currentZoom<CONFIG.zoomClusterThreshold)return 'clusters';if(App.currentZoom<CONFIG.zoomMediumThreshold)return 'constellation';return 'detail'},
 buildRenderState(){const scoped=App.globalNodes.filter(n=>App.pass(n));const byCluster=new Map();scoped.forEach(n=>{if(!byCluster.has(n.clusterKey))byCluster.set(n.clusterKey,[]);byCluster.get(n.clusterKey).push(n)});const clusters=[...byCluster.entries()].map(([k,arr])=>App.makeCluster(k,arr));clusters.forEach(c=>{c.x=c.x||c.tx;c.y=c.y||c.ty});const mode=App.modeForZoom();let nodes=[...clusters],links=[];const clusterIds=new Set(clusters.map(c=>c.id));function addTop(perCluster,totalCap){let detail=[];for(const [k,arr] of byCluster.entries()){arr.sort((a,b)=>score(b)-score(a));detail.push(...arr.slice(0,perCluster))}detail.sort((a,b)=>score(b)-score(a));detail=detail.slice(0,totalCap);nodes.push(...detail);detail.forEach(n=>links.push({source:'cluster:'+n.clusterKey,target:n.id,kind:'cluster-spoke',weight:1.5,curvature:.05}));}
 if(mode==='clusters'){links=[];const sorted=clusters.slice().sort((a,b)=>b.score-a.score);for(let i=1;i<Math.min(sorted.length,CONFIG.maxClusterLinks);i++)links.push({source:sorted[0].id,target:sorted[i].id,kind:'cluster-web',weight:2,curvature:.10});}
 else if(mode==='constellation'){const per=App.videoSafe?4:(App.detail==='cinema'?5:CONFIG.maxNodesMediumPerCluster);const cap=App.videoSafe?180:(App.detail==='wide'?520:App.detail==='deep'?720:360);addTop(per,cap);links.push(...App.filteredLinks(new Set(nodes.map(n=>n.id)),App.videoSafe?70:CONFIG.maxConstellationLinks));}
 else{const cap=App.videoSafe?220:(App.detail==='deep'?760:App.detail==='wide'?620:CONFIG.maxDetailNodes);addTop(999,cap);links.push(...App.filteredLinks(new Set(nodes.map(n=>n.id)),App.videoSafe?90:CONFIG.maxDetailLinks));}
 return {nodes,links,clusters,mode}},
 filteredLinks(ids,max){return App.globalLinks.filter(l=>ids.has(l.source)&&ids.has(l.target)).sort((a,b)=>(+b.weight||1)-(+a.weight||1)).slice(0,max).map(l=>({...l,source:l.source,target:l.target}))},
 updateView(alpha=.65){App.reindex();App.renderState=App.buildRenderState();App.render();App.sim.nodes(App.renderState.nodes);App.sim.force('link').links(App.renderState.links);App.sim.force('x',d3.forceX(d=>d.tx||App.clusterCenter(d.clusterKey||'CORE')[0]).strength(d=>d.kind==='cluster'?.22:(App.videoSafe?.04:.08)));App.sim.force('y',d3.forceY(d=>d.ty||App.clusterCenter(d.clusterKey||'CORE')[1]).strength(d=>d.kind==='cluster'?.22:(App.videoSafe?.04:.08)));if(App.live)App.sim.alpha(Math.min(alpha,App.videoSafe?.22:alpha)).restart();else App.sim.stop();App.updateModeIndicator();App.updateStats();App.drawFrame()},
 reindex(){App.nodeIndex=new Map(App.globalNodes.map(n=>[n.id,n]));},
 render(){const nodes=App.renderState.nodes,links=App.renderState.links;App.renderNodeMap=new Map(nodes.map(n=>[n.id,n]));nodes.forEach(n=>{if(!Number.isFinite(n.x)||!Number.isFinite(n.y)){const [cx,cy]=App.clusterCenter(n.clusterKey);const a=(hash(n.id)%100000)/100000*Math.PI*2;const r=30+(hash(n.id+'r')%260);n.x=cx+Math.cos(a)*r;n.y=cy+Math.sin(a)*r;n.vx=0;n.vy=0;}});
 const join=App.nodeG.selectAll('.node-group').data(nodes,d=>d.id);join.exit().transition().duration(180).style('opacity',0).remove();const enter=join.enter().append('g').attr('class','node-group').style('opacity',0).on('mouseenter',App.nodeEnter).on('mousemove',App.nodeMove).on('mouseleave',App.nodeLeave).on('click',App.nodeClick).call(d3.drag().on('start',App.dragStart).on('drag',App.dragMove).on('end',App.dragEnd));enter.transition().duration(260).style('opacity',1);enter.append('circle').attr('class','node-halo');enter.append('circle').attr('class','node-ring');enter.append('circle').attr('class','node-shell');enter.append('circle').attr('class','node-core');enter.append('text').attr('class','node-emoji').attr('dy',-1);enter.append('text').attr('class','node-badge');enter.append('text').attr('class','node-label');enter.append('text').attr('class','node-meta');App.nodeSelection=enter.merge(join);App.nodeSelection.attr('class',d=>`node-group ${d.kind==='cluster'?'cluster':'detail-node'} type-${d.type} ${App.selectedNode&&App.selectedNode.id===d.id?'selected':''}`).style('color',d=>colorFor(d.type));App.nodeSelection.select('.node-halo').attr('r',d=>d.radius*1.25).style('fill',d=>colorFor(d.type,.16));App.nodeSelection.select('.node-ring').attr('r',d=>d.radius*.84).style('stroke',d=>colorFor(d.type,.55));App.nodeSelection.select('.node-shell').attr('r',d=>d.radius*.62);App.nodeSelection.select('.node-core').attr('r',d=>d.radius*.42).style('fill',d=>colorFor(d.type,d.kind==='cluster'?.22:.16)).style('stroke',d=>colorFor(d.type,.92));App.nodeSelection.select('.node-emoji').text(App.emojiFor).style('font-size',d=>clamp(d.radius*.34,13,28)+'px');App.nodeSelection.select('.node-badge').text(d=>d.kind==='cluster'?d.count:(d.z>=28?'z'+d.z:''));App.nodeSelection.select('.node-label').text(d=>App.shortLabel(d.label)).attr('dy',d=>d.radius+17);App.nodeSelection.select('.node-meta').text(d=>d.kind==='cluster'?'cluster':(d.kind||d.group)).attr('dy',d=>d.radius+31);App.updateLabelLOD();},
 emojiFor(d){if(d.kind==='cluster')return '◎';if(d.kind==='core')return '🧠';if(d.kind==='governor')return '👁';if(d.kind==='sidecar')return '🫧';if(d.kind==='bias')return '⚖';if(d.kind==='hypothesis')return '◇';if(d.group==='mirror')return '●';if(d.group==='janus')return '✦';if(d.group==='pool')return '◎';if(d.kind==='accepted')return '✓';if(d.group==='tail'||d.kind==='tail')return '✶';if(d.kind==='concept')return '◆';return '•'},
 shortLabel(s){s=String(s||'node');return s.length>28?s.slice(0,27)+'…':s},
 drawFrame(){App.positionNodes();App.drawScene();},
 positionNodes(){if(!App.nodeSelection)return;App.nodeSelection.attr('transform',d=>`translate(${d.x||0},${d.y||0})`)},
 drawScene(){const ctx=App.ctx;if(!ctx)return;ctx.save();ctx.setTransform(App.dpr,0,0,App.dpr,0,0);ctx.clearRect(0,0,App.width,App.height);const t=App.currentTransform||d3.zoomIdentity;ctx.translate(t.x,t.y);ctx.scale(t.k,t.k);ctx.globalCompositeOperation='screen';(App.renderState.clusters||[]).forEach(c=>{const glow=52+(c.count||1)*4;const grad=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,glow);grad.addColorStop(0,colorFor(c.type,.11));grad.addColorStop(.5,colorFor(c.type,.045));grad.addColorStop(1,colorFor(c.type,0));ctx.fillStyle=grad;ctx.beginPath();ctx.arc(c.x,c.y,glow,0,Math.PI*2);ctx.fill()});(App.renderState.links||[]).forEach(l=>{const s=typeof l.source==='object'?l.source:App.renderNodeMap.get(l.source);const tt=typeof l.target==='object'?l.target:App.renderNodeMap.get(l.target);if(!s||!tt||!Number.isFinite(s.x)||!Number.isFinite(tt.x))return;const cur=Number.isFinite(l.curvature)?l.curvature:(s.clusterKey===tt.clusterKey?.06:.15);const mx=(s.x+tt.x)*.5+(tt.y-s.y)*cur,my=(s.y+tt.y)*.5-(tt.x-s.x)*cur;const grad=ctx.createLinearGradient(s.x,s.y,tt.x,tt.y);grad.addColorStop(0,colorFor(s.type,.46));grad.addColorStop(1,colorFor(tt.type,.46));ctx.strokeStyle=grad;ctx.lineWidth=clamp(Math.sqrt(+l.weight||1)*1.1,1,4)/Math.max(.7,t.k);ctx.globalAlpha=l.kind==='cluster-spoke'?.22:.46;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.quadraticCurveTo(mx,my,tt.x,tt.y);ctx.stroke()});ctx.globalAlpha=1;ctx.restore()},
 updateLabelLOD(){const k=App.currentZoom;const labels=App.labels;document.body.classList.toggle('labels-off',labels==='off');App.nodeG.selectAll('.node-label').style('opacity',d=>labels==='on'||(labels==='auto'&&(d.kind==='cluster'||k>.82||score(d)>45))?1:0);App.nodeG.selectAll('.node-meta,.node-badge').style('opacity',d=>labels==='on'||(labels==='auto'&&(d.kind==='cluster'||k>1.18||score(d)>65))?1:0)},
 updateModeIndicator(){const mode=App.renderState.mode||App.modeForZoom();document.body.classList.toggle('lod-clusters',mode==='clusters');document.querySelector('#view-indicator .mode').textContent='A17.5 '+mode.toUpperCase();document.querySelector('#view-indicator .focus').textContent=`zoom ${App.currentZoom.toFixed(2)} · ${App.renderState.nodes?.length||0} nodes · ${App.renderState.links?.length||0} links`},
 updateStats(){const c=App.lastGraph?.meta?.counters||{},top=App.lastGraph?.meta?.top_bias_routes||[];document.getElementById('stats').innerHTML=[`<span class=pill><b>${App.globalNodes.length}</b> total</span>`,`<span class=pill><b>${App.renderState.nodes?.length||0}</b> shown</span>`,`<span class=pill><b>${App.renderState.links?.length||0}</b> links</span>`,`<span class=pill>events <b>${c.events_seen||0}</b></span>`,`<span class=pill>J <b>${c.accepted_janus||0}</b></span>`,`<span class=pill>M <b>${c.accepted_mirror||0}</b></span>`,`<span class=pill>bias <b>${top[0]?App.shortLabel(top[0][0]):'—'}</b></span>`].join('')},
 fit(){App.svg.transition().duration(420).call(App.zoom.transform,d3.zoomIdentity.translate(App.width/2,App.height/2).scale(.34).translate(-App.width/2,-App.height/2))},
 nodeEnter(e,d){App.hoveredDatum=d;App.showInfo(d,false)},nodeMove(e,d){},nodeLeave(){},nodeClick(e,d){e.stopPropagation();App.selectedNode=d;App.nodeG.selectAll('.node-group').classed('selected',n=>n.id===d.id);App.showInfo(d,true)},deselect(){App.selectedNode=null;App.nodeG.selectAll('.node-group').classed('selected',false);document.getElementById('panel').classList.remove('visible')},
 showInfo(d,pin){const p=document.getElementById('panel');document.getElementById('panel-title').textContent=d.label||d.id;let body=`${d.kind} / ${d.group}\nID: ${d.id}`;if(d.kind==='cluster')body+=`\ncount: ${d.count}\nscore: ${Math.round(d.score||0)}`;if(d.z)body+=`\nz: ${d.z}`;if(d.purity!=null)body+=`\npurity: ${d.purity}`;if(d.data)body+=`\n\n${JSON.stringify(d.data,null,2).slice(0,1100)}`;document.getElementById('panel-desc').textContent=body;p.classList.add('visible');if(!pin){clearTimeout(App.infoTimer);App.infoTimer=setTimeout(()=>{if(!App.selectedNode)p.classList.remove('visible')},1800)}},
 dragStart(e,d){if(!e.active&&App.live)App.sim.alphaTarget(.18).restart();d.fx=d.x;d.fy=d.y},dragMove(e,d){d.fx=e.x;d.fy=e.y},dragEnd(e,d){if(!e.active)App.sim.alphaTarget(0);d.fx=null;d.fy=null},
 animateVisuals(){const chance=App.videoSafe?CONFIG.videoSafePulseChance:CONFIG.animationPulseChance;if(App.renderState.links&&App.renderState.links.length&&Math.random()<chance){const l=App.renderState.links[Math.floor(Math.random()*App.renderState.links.length)];const s=typeof l.source==='object'?l.source:App.renderNodeMap.get(l.source);const t=typeof l.target==='object'?l.target:App.renderNodeMap.get(l.target);if(s&&t&&Number.isFinite(s.x)&&Number.isFinite(t.x))App.impulse(s,t)}requestAnimationFrame(App.animateVisuals)},
 impulse(s,t){const spark=App.impulseG.append('circle').attr('class','impulse').attr('r',3.5).attr('cx',s.x).attr('cy',s.y).style('fill','#fff').style('color',colorFor(s.type));spark.transition().duration(850).ease(d3.easeQuadInOut).attr('cx',t.x).attr('cy',t.y).style('fill',colorFor(t.type)).on('end',function(){d3.select(this).remove()})},
 applyVideoSafe(on){App.videoSafe=!!on;document.body.classList.toggle('performance-paused',App.videoSafe&&!App.live);if(App.videoSafe){document.body.classList.add('presentation');document.getElementById('btn-present').classList.add('active');document.getElementById('labels').value='auto';App.labels='auto'}App.resetPollTimer();},
 resetPollTimer(){if(App.pollTimer)clearInterval(App.pollTimer);App.pollTimer=setInterval(App.pollStatus,App.videoSafe?CONFIG.videoSafeRefreshMs:CONFIG.refreshMs)},
 async loadGraph(manual=false){try{if(manual)document.getElementById('btn-reload').classList.add('loading');const r=await fetch('a17_hrain_graph.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('graph HTTP '+r.status);const data=await r.json();App.lastGraph=data;const old=new Map(App.globalNodes.map(n=>[n.id,{x:n.x,y:n.y,vx:n.vx,vy:n.vy}]));App.globalNodes=(data.nodes||[]).map(n=>{const nn=App.normalizeNode(n),p=old.get(String(n.id));if(p){nn.x=p.x;nn.y=p.y;nn.vx=p.vx;nn.vy=p.vy}return nn});const ids=new Set(App.globalNodes.map(n=>n.id));App.globalLinks=(data.links||[]).map(l=>({source:String(l.source),target:String(l.target),kind:l.kind||'link',weight:+l.weight||1,curvature:l.kind&&String(l.kind).includes('transition')?.18:.08})).filter(l=>ids.has(l.source)&&ids.has(l.target));App.updateView(manual?(App.videoSafe?.28:.85):(App.videoSafe?.16:.45));document.getElementById('status-light').classList.add('online')}catch(err){console.warn(err);document.querySelector('#view-indicator .focus').textContent='graph load error: '+err.message}finally{document.getElementById('btn-reload').classList.remove('loading')}},
 async pollStatus(){try{const r=await fetch('a17_status.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('status HTTP '+r.status);const s=await r.json();document.getElementById('status-light').classList.add('online');if((s.mtime||0)!==App.knownMtime){App.knownMtime=s.mtime||0;setTimeout(()=>App.loadGraph(false),180)}}catch(err){document.getElementById('status-light').classList.remove('online');}}
};
App.init();
</script>
